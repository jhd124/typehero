name: typehero

x-typehero-build-args: &typehero-build-args
  APP_URL: ${APP_URL:-http://localhost:3000}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
  ADMIN_URL: ${ADMIN_URL:-http://localhost:3000/admin}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

x-typehero-app: &typehero-app
  image: typehero-app:latest
  build:
    context: .
    target: runner
    args: *typehero-build-args
  env_file:
    - .env
  environment: &typehero-env
    DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-dev}@db:3306/typehero
    REDIS_URL: redis://redis:6379
    APP_URL: ${APP_URL:-http://localhost:3000}
    NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ADMIN_URL: ${ADMIN_URL:-http://localhost:3000/admin}
    NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  restart: unless-stopped
  networks:
    - typehero

services:
  web:
    <<: *typehero-app
    command: node apps/web/server.js
    environment:
      <<: *typehero-env
      PORT: 3000
    ports:
      - 3030:3000
  admin:
    <<: *typehero-app
    command: node apps/admin/server.js
    environment:
      <<: *typehero-env
      PORT: 3001
      AUTH_URL: ${ADMIN_URL:-http://localhost:3000/admin}
    ports:
      - 3031:3001

networks:
  typehero:
    name: typehero-network
    external: true
