name: typehero-db

x-typehero-db-env: &typehero-db-env
  DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-dev}@db:3306/typehero
  REDIS_URL: redis://redis:6379

services:
  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev}
      MYSQL_DATABASE: typehero
    volumes:
      - typehero-data:/var/lib/mysql
    ports:
      - 3306:3306
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u root -p"$${MYSQL_ROOT_PASSWORD}"']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - typehero
  redis:
    image: 'bitnami/redis:latest'
    container_name: typehero-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 6379:6379
    networks:
      - typehero
  db-init:
    image: typehero-db-init:latest
    build:
      context: .
      target: db-init
    env_file:
      - .env
    environment: *typehero-db-env
    restart: 'no'
    command: >
      sh -c "for i in $$(seq 1 30); do
      pnpm exec prisma db push &&
      pnpm exec tsx ./temp/seed-if-empty.ts &&
      exit 0;
      sleep 2;
      done;
      exit 1"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - typehero

volumes:
  typehero-data:
    driver: local

networks:
  typehero:
    name: typehero-network
    driver: bridge
